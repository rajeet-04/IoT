; PlatformIO Configuration for ESP32 IoT Device
; Board: ESP32 Dev Module

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
extra_scripts = pre:load_env.py
monitor_speed = 115200
upload_speed = 921600

; Dependencies
lib_deps = 
    bblanchon/ArduinoJson@^7.4.0
    links2004/WebSockets@^2.4.1

; Credentials are loaded by load_env.py from firmware/.env (gitignored).
build_flags = 
    -DCORE_DEBUG_LEVEL=4

; Serial monitor settings
monitor_filters = esp32_exception_decoder

; OTA settings (for future use)
; upload_port = firmware.local
; board_build.partitions = default.csv
