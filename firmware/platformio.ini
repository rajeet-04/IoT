; PlatformIO Configuration for ESP32 IoT Device
; Board: ESP32 Dev Module

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; Dependencies
lib_deps = 
    bblanchon/ArduinoJson@^7.4.0

; Build flags for credentials (set via environment or platformio.ini override)
; DO NOT hardcode actual values here - use build_flags or .env file
build_flags = 
    -DWIFI_SSID='"IQOO 12"'
    -DWIFI_PASSWORD='"xnj3uey821"'
    -DBACKEND_URL='"iot-wkvx.onrender.com"'
    -DDEVICE_TOKEN='"a9188147-5281-4a43-a177-0d8f0a20ace3"'
    -DCORE_DEBUG_LEVEL=4

; Serial monitor settings
monitor_filters = esp32_exception_decoder

; OTA settings (for future use)
; upload_port = firmware.local
; board_build.partitions = default.csv
